name: CI

on:
    pull_request:
        types: [opened, synchronize, reopened]
    workflow_dispatch:

jobs:
    ci:
        if: >-
            contains(fromJson('["OWNER","MEMBER","COLLABORATOR","BOT"]'), github.event.pull_request.author_association)
        uses: mydx-dev/common-workflow/.github/workflows/ci.yml@v1
        secrets: inherit
